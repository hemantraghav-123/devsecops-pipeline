global:
  # Scrape metrics every 15 seconds
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Scrape Flask app metrics
  - job_name: 'devsecops-flask-app'
    static_configs:
      - targets: ['98.88.1.75:8080']
    metrics_path: '/metrics'

  # Scrape Node Exporter for EC2 system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['98.88.1.75:9100']

  # Prometheus scrapes itself too (meta-monitoring)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']