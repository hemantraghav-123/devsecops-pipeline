apiVersion: v1
kind: Service
metadata:
  name: devsecops-service
spec:
  # NodePort exposes the app on a port of the EC2 node
  type: NodePort
  selector:
    app: devsecops-app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      # NodePort range is 30000-32767
      # We pick 30080 — accessible at EC2_IP:30080
      nodePort: 30080

