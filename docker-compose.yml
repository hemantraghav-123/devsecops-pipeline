version: '3.8'

services:

  # Your Flask app
  flask-app:
    image: raghav7704/devsecops-app:latest
    container_name: myapp
    ports:
      - "8080:8080"
    restart: always

  # Node Exporter — collects EC2 system metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      # Give Node Exporter read access to host system info
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: always

  # Prometheus — scrapes and stores metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      # Mount your prometheus.yml config into the container
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      # Persistent storage so data survives container restarts
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: always

  # Grafana — visualizes Prometheus data
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      # Default login credentials
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=devsecops123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      # Persistent storage so dashboards survive restarts
      - grafana_data:/var/lib/grafana
    restart: always
    depends_on:
      - prometheus

# Named volumes for persistent data
volumes:
  prometheus_data:
  grafana_data: