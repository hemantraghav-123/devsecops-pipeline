name: DevSecOps CI/CD Pipeline

# Trigger: runs on every push to main branch
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # Step 1: Pull your code into the GitHub Actions runner
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build Docker image and push to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

      # Step 4: SSH into EC2 and deploy new container
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest image from Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

            # Stop and remove old container if running
            docker stop myapp || true
            docker rm myapp || true

            # Run new container
            docker run -d -p 8080:8080 --name myapp ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

            # Show running containers
            docker ps
